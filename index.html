  for (const row of rows) {
    const concurrent = Math.floor(Math.random() * 6) + 1;
    const stagger = Math.ceil(TRAVEL / concurrent);
    row.forEach((t, i) => {
      pixelStates.push({
        tx: t.tx,
        ty: t.ty, // canvas coords — viewport offset added per-frame
        lum: t.lum,
        startY: 0,
        startTick: rowStartTick + i * stagger,
      });
    });
    rowStartTick += (row.length - 1) * stagger + TRAVEL + 1;
  }

  let tick = 0;
  animating = true;
  animPhase = 'in';
  placedPixels = [];

  function step() {
    octx.clearRect(0, 0, overlay.width, overlay.height);
    tick++;

    // Recalculate canvas top every frame so animation stays centered on resize
    const canvasTop = canvas.getBoundingClientRect().top;

    let allDone = true;
    for (const p of pixelStates) {
      if (tick < p.startTick) { allDone = false; continue; }
      const elapsed = tick - p.startTick;
      const progress = Math.min(1, elapsed / TRAVEL);
      const eased = progress * progress;
      const targetY = canvasTop + p.ty;
      const y = Math.round(p.startY + (targetY - p.startY) * eased);
      octx.fillStyle = `rgb(${p.lum},${p.lum},${p.lum})`;
      octx.fillRect(p.tx, y, SZ, SZ);
      if (progress < 1) {
        allDone = false;
      } else if (!p.placed) {
        p.placed = true;
        placedPixels.push({ x: p.tx, y: p.ty, lum: p.lum });
      }
    }

    if (!allDone) {
      raf = requestAnimationFrame(step);
    } else {
      particles = targets.map(t => ({ x: t.tx, y: t.ty, lum: t.lum }));
      drawStatic(imgIdx);
      overlay.remove();
      currentOverlay = null;
      animPhase = null;
      animating = false;
    }
  }

  raf = requestAnimationFrame(step);
}

animateIn(0);

function rainOut(nextIdx) {
  animating = true;
  animPhase = 'out';
  if (raf) cancelAnimationFrame(raf);

  const GRAVITY = 0.6;
  const RESTITUTION = 0.45;
  const floor = H - SZ;

  const drops = particles.map(p => ({
    x: p.x, y: p.y, lum: p.lum,
    vy: Math.random() * 1.5,
    delay: Math.floor(Math.random() * 8),
    tick: 0,
    bounced: false,
    fading: false,
    alpha: 1,
    done: false,
  }));

  function step() {
    ctx.clearRect(0, 0, W, H);
    let allDone = true;

    for (const d of drops) {
      if (d.done) continue;
      allDone = false;
      d.tick++;

      if (d.tick <= d.delay) {
        ctx.fillStyle = `rgb(${d.lum},${d.lum},${d.lum})`;
        ctx.fillRect(d.x, d.y, SZ, SZ);
        continue;
      }

      if (d.fading) {
        d.alpha -= 0.06;
        if (d.alpha <= 0) { d.done = true; continue; }
        ctx.fillStyle = `rgba(${d.lum},${d.lum},${d.lum},${d.alpha})`;
        ctx.fillRect(d.x, d.y, SZ, SZ);
        continue;
      }

      d.vy += GRAVITY;
      d.y += d.vy;

      if (d.y >= floor) {
        d.y = floor;
        if (!d.bounced) {
          d.vy = -d.vy * RESTITUTION;
          d.bounced = true;
        } else {
          d.fading = true;
          d.vy = 0;
        }
      }

      ctx.fillStyle = `rgb(${d.lum},${d.lum},${d.lum})`;
      ctx.fillRect(d.x, d.y, SZ, SZ);
    }

    if (!allDone) {
      raf = requestAnimationFrame(step);
    } else {
      animateIn(nextIdx);
    }
  }

  raf = requestAnimationFrame(step);
}

let clickCount = 1;
document.body.addEventListener('click', () => {
  const nextIdx = clickCount % DATA.images.length;

  if (animPhase === 'in') {
    cancelAnimationFrame(raf);
    if (currentOverlay) { currentOverlay.remove(); currentOverlay = null; }
    // Only rain out the pixels that actually landed
    ctx.clearRect(0, 0, W, H);
    for (const p of placedPixels) {
      ctx.fillStyle = `rgb(${p.lum},${p.lum},${p.lum})`;
      ctx.fillRect(p.x, p.y, SZ, SZ);
    }
    particles = placedPixels.slice();
    animating = false;
    animPhase = null;
    clickCount++;
    currentImg = nextIdx;
    rainOut(nextIdx);
    return;
  }

  if (animPhase === 'out') return; // let rain out finish naturally

  clickCount++;
  currentImg = nextIdx;
  rainOut(nextIdx);
});
</script>
</body>
</html>
